<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Douyin Downloader</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  </head>
  <body>
    <div id="root">
      <div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#0e0e14;color:#9b9baa;font-family:system-ui,sans-serif;">
        <div style="text-align:center;">
          <div style="font-size:0.85rem;opacity:0.5;">正在加载...</div>
        </div>
      </div>
    </div>
    <script>
      (() => {
        const root = document.getElementById("root");
        let bootReady = false;

        function stringifyError(error) {
          if (!error) return "未知错误";
          if (error instanceof Error) {
            return [error.message, error.stack].filter(Boolean).join("\n\n");
          }
          if (typeof error === "string") return error;
          try {
            return JSON.stringify(error, null, 2);
          } catch {
            return String(error);
          }
        }

        function renderBootError(title, detail) {
          if (!root) return;

          const shell = document.createElement("div");
          shell.style.cssText = "display:flex;align-items:center;justify-content:center;min-height:100vh;background:#08080d;color:#e8e8ed;font-family:system-ui,sans-serif;padding:24px;";

          const panel = document.createElement("div");
          panel.style.cssText = "width:min(760px,100%);background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:24px;box-shadow:0 12px 48px rgba(0,0,0,0.35);";

          const heading = document.createElement("h1");
          heading.textContent = title;
          heading.style.cssText = "margin:0 0 12px;font-size:1rem;color:#ff6b81;";

          const body = document.createElement("pre");
          body.textContent = detail;
          body.style.cssText = "margin:0;white-space:pre-wrap;word-break:break-word;font-size:12px;line-height:1.5;color:#b7b7c9;";

          panel.appendChild(heading);
          panel.appendChild(body);
          shell.appendChild(panel);
          root.replaceChildren(shell);
        }

        window.__DY_BOOT__ = {
          markReady() {
            bootReady = true;
          },
          reportError(title, error) {
            renderBootError(title, stringifyError(error));
          },
          moduleError(event) {
            const source = event?.target?.src || "/src/main.tsx";
            renderBootError("入口脚本加载失败", `无法加载模块脚本: ${source}`);
          },
        };

        window.addEventListener(
          "error",
          (event) => {
            const target = event.target;
            if (target && target !== window && target.tagName === "SCRIPT") {
              window.__DY_BOOT__.moduleError(event);
              return;
            }

            if (!bootReady) {
              const detail = [
                event.message,
                event.filename ? `${event.filename}:${event.lineno}:${event.colno}` : "",
                event.error?.stack || "",
              ]
                .filter(Boolean)
                .join("\n\n");

              window.__DY_BOOT__.reportError("应用启动失败", detail || "启动阶段发生未知错误");
            }
          },
          true
        );

        window.addEventListener("unhandledrejection", (event) => {
          if (!bootReady) {
            window.__DY_BOOT__.reportError("应用启动失败", event.reason);
          }
        });

        window.setTimeout(() => {
          if (!bootReady) {
            window.__DY_BOOT__.reportError(
              "应用启动超时",
              "前端入口在 8 秒内没有完成初始化，通常表示模块加载或启动阶段抛错。"
            );
          }
        }, 8000);
      })();
    </script>
    <script
      type="module"
      src="/src/main.tsx"
      onerror="window.__DY_BOOT__ && window.__DY_BOOT__.moduleError(event)"
    ></script>
  </body>
</html>
